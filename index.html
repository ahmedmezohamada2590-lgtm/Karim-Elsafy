<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم كريم الصافي</title>
    <style>
        :root { --dark: #1c352d; --gold: #c5a059; --cream: #fbf8f2; }
        body { background: var(--cream); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* شاشة تسجيل الدخول */
        #auth-screen { padding: 30px; text-align: center; margin-top: 50px; }
        .auth-input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid var(--gold); border-radius: 8px; font-size: 16px; }
        .btn-main { background: var(--dark); color: white; width: 95%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        
        /* الهيدر */
        .header { background: var(--dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .menu-icon { color: var(--gold); font-size: 28px; cursor: pointer; }
        .logo-container { text-align: center; flex-grow: 1; }
        .logo-main { color: var(--gold); font-size: 24px; font-weight: bold; }
        .logo-sub { color: white; font-size: 12px; letter-spacing: 2px; }
        
        /* البانر */
        .banner { text-align: center; padding: 15px; }
        .banner h2 { color: var(--dark); font-size: 26px; margin: 0; }
        .quote { color: var(--gold); font-style: italic; font-weight: bold; font-size: 14px; margin: 5px 0; }
        .badge { display: inline-block; background: white; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--dark); font-size: 12px; font-weight: bold; }

        /* الأصناف */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; background: #ddd; }
        .card h4 { color: var(--dark); margin: 10px 0 5px; font-size: 16px; }
        .card p { font-size: 11px; color: #666; margin: 0 0 10px; height: 30px; overflow: hidden; }
        .price { color: var(--dark); font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .btn-order { background: #1c352d; color: white; width: 100%; padding: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* ناف بار */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--dark); color: white; border-top: 2px solid var(--gold); }
        .nav-item { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: var(--dark);">تسجيل الدخول / إنشاء حساب</h2>
        <input type="text" id="userName" class="auth-input" placeholder="الاسم بالكامل">
        <input type="tel" id="userPhone" class="auth-input" placeholder="رقم التليفون">
        <input type="password" id="userPass" class="auth-input" placeholder="كلمة السر">
        <button onclick="window.handleAuth()" class="btn-main">دخول</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="menu-icon">☰</div>
            <div class="logo-container">
                <div class="logo-main">KARIM ELSAFY</div>
                <div class="logo-sub">RESTAURANT</div>
            </div>
            <div style="width: 28px;"></div>
        </div>

        <div class="banner">
            <h2>أصناف الفطار</h2>
            <div class="badge">صحتين وهنا 🌸</div>
            <p class="quote">جميع الأصناف تشمل عصير فواكه طازج 🍓</p>
        </div>

        <div class="grid" id="menu-grid">
            </div>

        <div class="bottom-nav">
            <div class="nav-item" style="border-left: 1px solid #444;" onclick="alert('أنت في قسم الأصناف')">الأصناف</div>
            <div class="nav-item" onclick="alert('طلباتك محفوظة وسيتم توصيلها في الميعاد')">طلباتي</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfWi4wxoPbw3mTFTj5Jh-xfKog2kB8Bkc",
            authDomain: "karim-elsafy.firebaseapp.com",
            projectId: "karim-elsafy",
            storageBucket: "karim-elsafy.firebasestorage.app",
            messagingSenderId: "1046325479843",
            appId: "1:1046325479843:web:cf78c248826c67266ef216",
            databaseURL: "https://karim-elsafy-default-rtdb.firebaseio.com" // ضفتهولك عشان الـ Realtime DB
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // المنيو الافتراضي (زي السكرين شوت بالظبط)
        const defaultMenu = [
            { id: 1, name: "بيض بالبسطرمة", price: "70", desc: "بيض طازج مع شرائح البسطرمة الممتازة", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 2, name: "لانشون حلواني", price: "65", desc: "شرائح لانشون حلواني بقرى فاخر", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 3, name: "بيض مقلي", price: "70", desc: "بيض مقلي بالسمن البلدي", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 4, name: "لانشون تركي", price: "65", desc: "شرائح لانشون ديك رومي مدخن", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 5, name: "بلوفيف بالبيض", price: "70", desc: "كروسان محشو بالبلوفيف وبيض مقلي وجبنة شيدر", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 6, name: "جبنة رومي", price: "65", desc: "شرائح جبنة رومي قديمة ومعتقة", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 7, name: "حلاوة بالقشطة", price: "65", desc: "حلاوة طحينية فاخرة مع قشطة طازجة", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" },
            { id: 8, name: "مربي بالقشطة", price: "65", desc: "مربى فراولة غنية مع القشطة الفلاحي", img: "https://via.placeholder.com/150/1c352d/c5a059?text=Image" }
        ];

        let currentUser = JSON.parse(localStorage.getItem('karimUser'));

        // فحص الدخول التلقائي
        if(currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadMenu();
        }

        window.handleAuth = async function() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const pass = document.getElementById('userPass').value;

            if(!name || !phone || !pass) return alert("اكتب كل البيانات يا غالي");

            // حفظ المستخدم في قاعدة البيانات
            await set(ref(db, 'users/' + phone), { name, phone, pass });
            currentUser = { name, phone };
            localStorage.setItem('karimUser', JSON.stringify(currentUser));
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadMenu();
        };

        async function loadMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            
            // بيجيب الأصناف من الأدمين، لو مفيش بيعرض الافتراضي اللي فوق
            get(ref(db, 'products')).then((snapshot) => {
                let items = snapshot.exists() ? Object.values(snapshot.val()) : defaultMenu;
                
                items.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.img}" alt="${item.name}">
                            <h4>${item.name}</h4>
                            <p>${item.desc}</p>
                            <div class="price">${item.price} جنيه</div>
                            <button class="btn-order" onclick="window.placeOrder('${item.name}', '${item.price}')">طلب</button>
                        </div>
                    `;
                });
            });
        }

        window.placeOrder = async function(itemName, itemPrice) {
            const address = prompt("اكتب عنوان التوصيل بالتفصيل:");
            if(!address) return;

            const orderData = {
                customerName: currentUser.name,
                customerPhone: currentUser.phone,
                item: itemName,
                price: itemPrice,
                address: address,
                time: new Date().toLocaleTimeString(),
                status: 'جديد'
            };

            await push(ref(db, 'orders'), orderData);
            alert("تم تأكيد الطلب بنجاح! طلبك هيوصلك في أسرع وقت.");
        }
    </script>
</body>
</html>
