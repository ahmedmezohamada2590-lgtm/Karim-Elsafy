<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM ELSAFY</title>
    <style>
        /* التصميم السيمبل والراقي */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; color: #1a1a1a; margin: 0; padding: 0; }
        
        /* الهيدر */
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #eaeaea; }
        .logo { font-size: 24px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
        
        /* الأصناف */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 40px 20px; max-width: 1000px; margin: auto; }
        .card { text-align: center; }
        .card img { width: 100%; height: 350px; object-fit: cover; background: #f9f9f9; }
        .card h4 { font-size: 18px; font-weight: 400; margin: 20px 0 10px; }
        .card .price { font-size: 14px; color: #666; margin-bottom: 20px; }
        
        /* زر الطلب */
        .btn-order { background: transparent; border: 1px solid #1a1a1a; padding: 10px 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-order:hover { background: #1a1a1a; color: #ffffff; }

        /* نموذج الطلب */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: #fff; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .form-container { max-width: 500px; margin: 100px auto; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 0; box-sizing: border-box; }
        
        /* تسجيل الدخول */
        #auth-screen { text-align: center; padding: 100px 20px; }
        .btn-main { background: #1a1a1a; color: white; padding: 15px 40px; border: none; cursor: pointer; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 class="logo">Karim ElSafy</h1>
        <input type="text" id="userName" placeholder="الاسم">
        <input type="tel" id="userPhone" placeholder="رقم الهاتف">
        <input type="password" id="userPass" placeholder="كلمة المرور">
        <button onclick="window.handleAuth()" class="btn-main">دخول</button>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo">Karim ElSafy</div>
        </header>

        <div class="grid" id="menu-grid"></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="form-container">
            <h3>إتمام الطلب</h3>
            <input type="text" id="custName" placeholder="الاسم الكامل">
            <input type="text" id="custAddress" placeholder="العنوان">
            <input type="file" id="imageInput">
            <button class="btn-order" style="width:100%" onclick="submitOrder()">تأكيد الطلب</button>
            <p onclick="document.getElementById('orderModal').style.display='none'" style="cursor:pointer; text-align:center; margin-top:20px;">إلغاء</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Firebase Config (كما هو)
        const firebaseConfig = { /* ... */ };
        const db = getDatabase(initializeApp(firebaseConfig));

        // التحقق من الدخول
        if(localStorage.getItem('karimUser')) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadMenu();
        }

        window.handleAuth = async function() {
            const phone = document.getElementById('userPhone').value;
            // ... (لوجيك الدخول)
            localStorage.setItem('karimUser', JSON.stringify({phone}));
            location.reload();
        };

        function loadMenu() {
            const grid = document.getElementById('menu-grid');
            const items = [{name: "بيض بالبسطرمة", price: "70 EGP"}, {name: "لانشون حلواني", price: "65 EGP"}];
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="https://via.placeholder.com/300" alt="${item.name}">
                        <h4>${item.name}</h4>
                        <div class="price">${item.price}</div>
                        <button class="btn-order" onclick="document.getElementById('orderModal').style.display='block'">اطلب الآن</button>
                    </div>
                `;
            });
        }

        window.submitOrder = async function() {
            alert("تم استلام طلبك");
            document.getElementById('orderModal').style.display = 'none';
        }
    </script>
</body>
</html>
