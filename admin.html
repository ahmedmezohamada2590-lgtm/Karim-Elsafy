<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأدمن</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #eee; margin: 0; padding: 20px; }
        .login-box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 50px auto; text-align: center; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; }
        .login-box button { background: #1c352d; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
        #dashboard { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: #1c352d; color: white; text-align: center; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .panel { background: white; padding: 20px; border-radius: 10px; display: none; }
        .active-panel { display: block; }
        .order-card, .product-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; background: white; }
        .btn-done { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-save { background: #c5a059; color: #fff; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box" id="admin-login">
        <h2>دخول الأدمن</h2>
        <input type="text" id="adminPhone" placeholder="رقم تليفون الأدمين">
        <button onclick="window.adminLogin()">تسجيل الدخول</button>
    </div>
    <div id="dashboard">
        <div class="tabs">
            <div class="tab-btn" onclick="window.switchTab('ordersPanel')">الطلبات الواردة</div>
            <div class="tab-btn" onclick="window.switchTab('productsPanel')">تعديل/إضافة أصناف</div>
        </div>
        <div id="ordersPanel" class="panel active-panel">
            <h2>الطلبات الجديدة</h2>
            <div id="ordersList">جاري التحميل...</div>
        </div>
        <div id="productsPanel" class="panel">
            <h2 id="formTitle">إضافة صنف جديد</h2>
            <input type="text" id="pName" placeholder="اسم الصنف">
            <input type="number" id="pPrice" placeholder="السعر">
            <input type="text" id="pDesc" placeholder="المكونات">
            <p>صورة الصنف:</p>
            <input type="file" id="pImgFile" accept="image/*">
            <input type="hidden" id="pImgHidden">
            <button class="btn-save" id="saveBtn" onclick="window.saveProduct()">حفظ الصنف ونشره</button>
            <hr><h3>الأصناف الحالية</h3><div id="productsList"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        const db = getDatabase(initializeApp({databaseURL: "https://karim-elsafy-default-rtdb.firebaseio.com"}));
        let editKey = null;

        window.adminLogin = function() {
            if(document.getElementById('adminPhone').value === '01011158770') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else { alert("رقم الأدمن غير صحيح!"); }
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(tabId).classList.add('active-panel');
        };

        function loadData() {
            onValue(ref(db, 'orders'), (snapshot) => {
                const list = document.getElementById('ordersList');
                list.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        let order = child.val();
                        list.innerHTML += `
                            <div class="order-card">
                                <h3>الطلب: ${order.item}</h3>
                                <p><b>العميل:</b> ${order.customerName} - ${order.customerPhone}</p>
                                <p><b>العنوان:</b> ${order.address}</p>
                                <p><b>وقت الطلب:</b> ${order.time}</p>
                                <img src="${order.imageUrl}" style="max-width:100px; display:block; margin: 10px 0;">
                                <button class="btn-done" onclick="window.completeOrder('${child.key}')">تم التسليم</button>
                            </div>
                        `;
                    });
                } else { list.innerHTML = "لا توجد طلبات حالياً."; }
            });

            onValue(ref(db, 'products'), (snapshot) => {
                const list = document.getElementById('productsList');
                list.innerHTML = '';
                snapshot.forEach(child => {
                    let item = child.val();
                    list.innerHTML += `
                        <div class="product-card">
                            ${item.name} - ${item.price} جنيه
                            <div style="margin-top:10px;">
                                <button onclick="window.editProduct('${child.key}', ${JSON.stringify(item).replace(/"/g, "'")})">تعديل</button>
                                <button onclick="window.deleteProduct('${child.key}')" style="background:red; color:white; border:none; padding:5px 10px;">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.editProduct = (key, item) => {
            editKey = key;
            document.getElementById('pName').value = item.name;
            document.getElementById('pPrice').value = item.price;
            document.getElementById('pDesc').value = item.desc || "";
            document.getElementById('pImgHidden').value = item.img || "";
            document.getElementById('formTitle').innerText = "تعديل صنف";
            document.getElementById('saveBtn').innerText = "تحديث البيانات";
        };

        window.deleteProduct = (key) => { if(confirm("متأكد من الحذف؟")) remove(ref(db, 'products/' + key)); };
        window.completeOrder = (key) => remove(ref(db, 'orders/' + key));

        window.saveProduct = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const fileInput = document.getElementById('pImgFile');
            
            if(!name || !price) return alert("اكتب اسم وسعر الصنف!");

            const executeSave = (imageUrl) => {
                const data = { name, price, desc, img: imageUrl };
                if(editKey) {
                    update(ref(db, 'products/' + editKey), data);
                    editKey = null;
                    document.getElementById('formTitle').innerText = "إضافة صنف جديد";
                    document.getElementById('saveBtn').innerText = "حفظ الصنف ونشره";
                } else {
                    push(ref(db, 'products'), data);
                }
                document.getElementById('pName').value = ''; 
                document.getElementById('pPrice').value = ''; 
                document.getElementById('pDesc').value = '';
                fileInput.value = '';
                document.getElementById('pImgHidden').value = '';
                alert("تم الحفظ!");
            };

            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => executeSave(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                executeSave(document.getElementById('pImgHidden').value);
            }
        };
    </script>
</body>
</html>
