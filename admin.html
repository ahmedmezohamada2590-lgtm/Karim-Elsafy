<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمين</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #eee; margin: 0; padding: 20px; }
        .login-box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 50px auto; text-align: center; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; }
        .login-box button { background: #1c352d; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
        
        #dashboard { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: #1c352d; color: white; text-align: center; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .panel { background: white; padding: 20px; border-radius: 10px; display: none; }
        .active-panel { display: block; }
        
        .order-card, .product-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-save { background: #c5a059; color: #fff; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box" id="admin-login">
        <h2>دخول الأدمين</h2>
        <input type="text" id="adminPhone" placeholder="رقم تليفون الأدمين">
        <button onclick="window.adminLogin()">تسجيل الدخول</button>
    </div>

    <div id="dashboard">
        <div class="tabs">
            <div class="tab-btn" onclick="window.switchTab('ordersPanel')">الطلبات الواردة</div>
            <div class="tab-btn" onclick="window.switchTab('productsPanel')">تعديل/إضافة أصناف</div>
        </div>

        <div id="ordersPanel" class="panel active-panel">
            <h2>الطلبات الجديدة</h2>
            <div id="ordersList">جاري التحميل...</div>
        </div>

        <div id="productsPanel" class="panel">
            <h2>إضافة صنف جديد (هيتحدث عند الزباين فوراً)</h2>
            <input type="text" id="pName" placeholder="اسم الصنف (مثال: بيض بالبسطرمة)">
            <input type="number" id="pPrice" placeholder="السعر (مثال: 70)">
            <input type="text" id="pDesc" placeholder="المكونات والتفاصيل">
            <input type="text" id="pImg" placeholder="رابط صورة الصنف">
            <button class="btn-save" onclick="window.saveProduct()">حفظ الصنف ونشره</button>
            <hr>
            <h3>الأصناف الحالية</h3>
            <div id="productsList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfWi4wxoPbw3mTFTj5Jh-xfKog2kB8Bkc",
            authDomain: "karim-elsafy.firebaseapp.com",
            projectId: "karim-elsafy",
            storageBucket: "karim-elsafy.firebasestorage.app",
            messagingSenderId: "1046325479843",
            appId: "1:1046325479843:web:cf78c248826c67266ef216",
            databaseURL: "https://karim-elsafy-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // دخول الأدمين برقمك
        window.adminLogin = function() {
            const phone = document.getElementById('adminPhone').value;
            if(phone === '01011158770') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                alert("رقم الأدمين غير صحيح!");
            }
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(tabId).classList.add('active-panel');
        };

        function loadData() {
            // جلب الطلبات
            onValue(ref(db, 'orders'), (snapshot) => {
                const list = document.getElementById('ordersList');
                list.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        let order = child.val();
                        list.innerHTML += `
                            <div class="order-card">
                                <h3>الطلب: ${order.item} (${order.price} جنيه)</h3>
                                <p><b>اسم العميل:</b> ${order.customerName}</p>
                                <p><b>رقم العميل:</b> ${order.customerPhone}</p>
                                <p><b>العنوان:</b> ${order.address}</p>
                                <p><b>وقت الطلب:</b> ${order.time}</p>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = "لا توجد طلبات حالياً.";
                }
            });

            // جلب الأصناف
            onValue(ref(db, 'products'), (snapshot) => {
                const list = document.getElementById('productsList');
                list.innerHTML = '';
                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        let item = child.val();
                        list.innerHTML += `<div class="product-card">${item.name} - ${item.price} جنيه</div>`;
                    });
                }
            });
        }

        window.saveProduct = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const img = document.getElementById('pImg').value || "https://via.placeholder.com/150/1c352d/c5a059?text=New+Item";

            if(!name || !price) return alert("اكتب اسم وسعر الصنف!");

            await push(ref(db, 'products'), { name, price, desc, img });
            alert("تم إضافة الصنف بنجاح للزباين!");
            
            // تفريغ الخانات
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pImg').value = '';
        };
    </script>
</body>
</html>
